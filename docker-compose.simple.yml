# Self-contained deployment: Postgres + MCP server + Caddy (TLS).
#
# Use this if you don't already run Postgres / Traefik / etc. The full
# `docker-compose.yml` is the maintainer's homelab reference and assumes
# an external Traefik with OAuth chain — adapt to taste.
#
# Configuration: copy `.env.example` to `.env`, set MCP_HOSTNAME, OPENAI_API_KEY,
# SECRET_KEY, VAULT_HOST_PATH, and a strong DB password (also propagate to
# DATABASE_URL and POSTGRES_PASSWORD below). Then:
#
#   docker compose -f docker-compose.simple.yml up -d
#
# Caddy will auto-issue Let's Encrypt certs from MCP_HOSTNAME.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: obsidian-mcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: obsidian_mcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: obsidian_mcp
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/db-init-simple.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obsidian_mcp -d obsidian_mcp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mcp_internal

  obsidian-mcp:
    build: .
    image: obsidian-mcp:local
    container_name: obsidian-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ${VAULT_HOST_PATH:-./vault}:/obsidian
    networks:
      - mcp_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000"

  caddy:
    image: caddy:2
    container_name: obsidian-mcp-caddy
    restart: unless-stopped
    depends_on:
      - obsidian-mcp
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      MCP_HOSTNAME: ${MCP_HOSTNAME:-obsidian-mcp.localhost}
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mcp_internal

networks:
  mcp_internal:
    driver: bridge

volumes:
  pg_data:
  caddy_data:
  caddy_config:
